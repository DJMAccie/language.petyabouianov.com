<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Studio | Petya Bouianov</title>
    <meta name="description" content="Study Japanese, Indonesian, Italian, and Dutch with Petya Bouianov's language tools.">
    <link rel="canonical" href="https://language.petyabouianov.com/">
    <meta property="og:title" content="Language Studio | Petya Bouianov">
    <meta property="og:description" content="Study Japanese, Indonesian, Italian, and Dutch with Petya Bouianov's language tools.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://language.petyabouianov.com/">
    <meta property="og:image" content="https://petyabouianov.com/images/Petya-2.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Language Studio | Petya Bouianov">
    <meta name="twitter:description" content="Study Japanese, Indonesian, Italian, and Dutch with Petya Bouianov's language tools.">
    <meta name="twitter:image" content="https://petyabouianov.com/images/Petya-2.jpg">
    <style>
        :root {
            --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100svh;
            display: grid;
            place-items: center;
            padding: clamp(1rem, 3vw, 2rem);
            background: #fff;
            color: #000;
            font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .home-nav {
            width: min(100%, 22rem);
            display: grid;
            gap: 0.7rem;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 3rem;
            width: 100%;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.96rem;
            font-weight: 700;
            transition: transform 0.18s var(--ease-out-quart), background-color 0.18s var(--ease-out-quart), color 0.18s var(--ease-out-quart);
            animation: button-in 0.42s var(--ease-out-quart) both;
        }

        .home-link:nth-child(2) {
            animation-delay: 0.06s;
        }

        .home-link:nth-child(3) {
            animation-delay: 0.12s;
        }

        .home-link:nth-child(4) {
            animation-delay: 0.18s;
        }

        .home-link:hover,
        .home-link:focus-visible {
            background: #000;
            color: #fff;
            transform: translateY(-1px);
            outline: none;
        }

        .home-link:active {
            transform: translateY(0) scale(0.99);
        }

        .home-link:focus-visible {
            outline: 2px solid #000;
            outline-offset: 3px;
        }

        @keyframes button-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .home-link {
                animation: none;
                transition: none;
            }

            .home-link:hover,
            .home-link:focus-visible,
            .home-link:active {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <nav class="home-nav" aria-label="Language studios">
        <a class="home-link" href="/nihongo-studio">Nihongo</a>
        <a class="home-link" href="/bahasa-studio">Bahasa</a>
        <a class="home-link" href="/italia-studio">Italia</a>
        <a class="home-link" href="/nederlands-studio">Nederlands</a>
    </nav>
</body>
</html>
