<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Studio | Petya Bouianov</title>
    <meta name="description" content="Study Japanese, Indonesian, Italian, and Dutch with Petya Bouianov's language tools.">
    <link rel="canonical" href="https://language.petyabouianov.com/">
    <meta property="og:title" content="Language Studio | Petya Bouianov">
    <meta property="og:description" content="Study Japanese, Indonesian, Italian, and Dutch with Petya Bouianov's language tools.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://language.petyabouianov.com/">
    <meta property="og:image" content="https://petyabouianov.com/images/Petya-2.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Language Studio | Petya Bouianov">
    <meta name="twitter:description" content="Study Japanese, Indonesian, Italian, and Dutch with Petya Bouianov's language tools.">
    <meta name="twitter:image" content="https://petyabouianov.com/images/Petya-2.jpg">
    <link rel="stylesheet" href="studio.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            color: var(--studio-text);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
            pointer-events: none;
        }

        main {
            width: min(100%, 38rem);
            padding: 1.75rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--studio-text-faint);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1;
            letter-spacing: -0.04em;
        }

        p {
            margin: 0;
            max-width: 32rem;
            color: var(--studio-text-muted);
            font-size: 0.98rem;
            line-height: 1.55;
        }

        nav {
            display: grid;
            gap: 0.7rem;
            margin-top: 0.5rem;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.95rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: var(--studio-shadow-soft);
            color: var(--studio-text);
            text-decoration: none;
            font-size: 1.02rem;
            font-weight: 600;
            transition: transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease;
        }

        a:hover,
        a:focus-visible {
            transform: translateY(-1px);
            border-color: rgba(59, 130, 246, 0.28);
            background: rgba(255, 255, 255, 0.9);
            color: var(--studio-accent-strong);
            outline: none;
        }

        .link-copy {
            font-size: 0.84rem;
            font-weight: 500;
            color: var(--studio-text-faint);
        }

        @media (max-width: 640px) {
            main {
                padding: 1.3rem;
                border-radius: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <main class="mac-window">
        <div class="eyebrow">Language Studio</div>
        <h1>Choose a desk.</h1>
        <p>Focused study spaces for Japanese, Indonesian, Italian, and Dutch. Same rhythm, different language.</p>
        <nav aria-label="Language studios">
            <a href="/nihongo-studio"><span>Nihongo</span><span class="link-copy">Japanese</span></a>
            <a href="/bahasa-studio"><span>Bahasa</span><span class="link-copy">Indonesian</span></a>
            <a href="/italia-studio"><span>Italia</span><span class="link-copy">Italian</span></a>
            <a href="/nederlands-studio"><span>Nederlands</span><span class="link-copy">Dutch</span></a>
        </nav>
    </main>
</body>
</html>
