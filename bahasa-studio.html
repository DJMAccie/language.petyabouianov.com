<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bahasa Studio | Indonesian Study Tool by Petya Bouianov</title>
    <meta name="description" content="Practice Indonesian vocabulary, quiz yourself, and track your study progress in Bahasa Studio by Petya Bouianov.">
    <link rel="canonical" href="https://language.petyabouianov.com/bahasa-studio">
    <meta property="og:title" content="Bahasa Studio | Indonesian Study Tool">
    <meta property="og:description" content="An Indonesian vocabulary trainer with quizzes, speech practice, and list-based study sessions.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://language.petyabouianov.com/bahasa-studio">
    <meta property="og:image" content="https://petyabouianov.com/images/Petya-2.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Bahasa Studio | Indonesian Study Tool">
    <meta name="twitter:description" content="Practice Indonesian vocabulary and track your study progress in Bahasa Studio.">
    <meta name="twitter:image" content="https://petyabouianov.com/images/Petya-2.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="studio.css?v=20260408d">
    <style>
        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* --- Mic Button Listening Animation --- */
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .mic-listening::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.4);
            animation: pulse-ring 1s ease-out infinite;
        }
    </style>

</head>

<body class="min-h-screen w-full flex items-center justify-center p-0 md:p-4 overflow-x-hidden">

    <!-- MAIN WINDOW -->
    <div
        class="mac-window w-full max-w-6xl md:h-[85vh] h-[100dvh] md:rounded-xl rounded-none md:border border-white/40 border-none overflow-hidden flex flex-col relative">

        <!-- HEADER -->
        <div data-studio-header
            class="bg-gradient-to-b from-gray-100 to-gray-200 border-b border-gray-300 h-10 flex items-center px-4 justify-between shrink-0 select-none relative z-50">
            <div class="w-10" data-studio-header-left></div>
            <div class="text-sm font-semibold text-gray-600 flex items-center gap-2">
                <i class="fas fa-flag text-red-500"></i> Bahasa Indonesia
            </div>
            <div class="w-10" data-studio-header-right></div>
        </div>

        <link rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 900 600%22><rect width=%22900%22 height=%22300%22 fill=%22%23DC1F26%22/><rect y=%22300%22 width=%22900%22 height=%22300%22 fill=%22white%22/></svg>">

        <!-- TOOLBAR -->
        <div id="system-bar"
            class="bg-gray-50/80 p-4 md:p-6 border-b border-gray-200 shrink-0 flex flex-col items-center justify-center gap-3 transition-all duration-300 ease-in-out relative z-10">
            <div class="w-full flex flex-col md:flex-row justify-between items-center gap-3 md:gap-0 max-w-5xl">
                <!-- Action Buttons -->
                <div class="studio-toolbar-actions w-full md:w-auto justify-center md:justify-start">
                    <button type="button" onclick="openCreateNew()" aria-label="Create a new list"
                        class="studio-toolbar-pill-btn">
                        <i class="fas fa-plus studio-toolbar-icon"></i> New List
                    </button>
                    <!-- MIX BUTTON -->
                    <button type="button" onclick="startMixSession()" aria-label="Start a mixed review session" title="Start mixed review"
                        class="studio-toolbar-icon-btn">
                        <i class="fas fa-random studio-toolbar-icon"></i>
                    </button>
                </div>
                <!-- Simple Search -->
                <div class="relative w-full md:w-96 group">
                    <i class="fas fa-search absolute left-4 top-3.5 text-gray-400 group-focus-within:text-blue-500"></i>
                    <input type="text" id="list-search" placeholder="Search lists..." onkeyup="filterLists()" aria-label="Search lists"
                        class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-300 rounded-full text-sm focus:outline-none focus:ring-4 focus:ring-blue-400/30 focus:border-blue-400 shadow-sm transition-all search-input">
                </div>
                <!-- Mode Toggle -->
                <div class="relative w-full md:w-auto">
                    <select id="global-quiz-mode" onchange="renderTable(loadedLists, loadedScores)" aria-label="Quiz mode"
                        class="w-full md:w-auto appearance-none bg-white border border-gray-300 text-gray-600 py-2 pl-4 pr-10 rounded-full text-sm font-medium shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer">
                        <option value="en-jp" selected>Eng → Indo</option>
                        <option value="jp-en">Indo → Eng</option>
                        <option value="speech">🗣 Bicara</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="flex-1 min-h-0 bg-white relative flex flex-col z-0" data-studio-content>

            <!-- TABLE SECTION -->
            <div id="select-section" class="flex-1 overflow-auto animate-fade-in flex flex-col">
                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse finder-table">
                        <thead class="bg-white sticky top-0 border-b border-gray-200 shadow-sm z-10">
                            <tr>
                                <th class="p-3 pl-6 text-xs font-medium text-gray-500 uppercase w-1/3">List Name</th>
                                <th class="p-3 text-xs font-medium text-gray-500 uppercase">Words</th>
                                <th class="p-3 text-xs font-medium text-gray-500 uppercase hidden md:table-cell">
                                    Accuracy</th>
                                <th id="status-sort-header" aria-sort="none" class="p-3 text-xs font-medium text-gray-500 uppercase hidden md:table-cell">
                                    <button id="status-sort-trigger" type="button" onclick="toggleStatusSort()" class="studio-table-sort-btn">Status</button>
                                </th>
                                <th class="p-3 pr-6 text-xs font-medium text-gray-500 uppercase text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="list-table-body" class="text-sm text-gray-700">
                            <!-- JS Injects Rows Here -->
                        </tbody>
                    </table>
                </div>
                <!-- FOOTER -->
                <div
                    class="bg-gray-50 border-t border-gray-200 py-2 px-4 shrink-0 flex justify-between items-center select-none relative h-10">
                    <div class="flex items-center gap-2 text-[11px] text-gray-400 font-medium z-10 relative">
                        <span id="total-lists-count">0 lists</span>
                        <span>•</span>
                        <span id="total-words-count">0 words</span>
                    </div>

                    <!-- CENTERED QUOTE -->
                    <div id="daily-quote"
                        class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center w-2/3 hidden md:block">
                        <!-- JS injects quote here -->
                    </div>

                    <div class="flex items-center gap-1.5 text-[11px] text-gray-400 font-medium hover:text-gray-600 transition-colors cursor-default z-10 relative"
                        title="Your current study streak">
                        <i id="streak-icon" class="fas fa-fire text-gray-300 transition-colors"></i>
                        <span id="streak-text">0 Day Streak</span>
                    </div>
                </div>
            </div>

            <!-- SETUP SECTION (Create/Edit) -->
            <div id="setup-section" class="hidden absolute inset-0 bg-white z-20 flex flex-col animate-fade-in">
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center shrink-0">
                    <h2 class="font-semibold text-gray-700">Edit Collection</h2>
                    <button type="button" onclick="showSection('select')" class="text-gray-400 hover:text-gray-600 transition" aria-label="Close editor"><i
                            class="fas fa-times text-lg"></i></button>
                </div>
                <div class="flex-1 overflow-y-auto p-6 w-full max-w-3xl mx-auto">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">List Name</label>
                            <input type="text" id="list-name-input" maxlength="100"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Words <span
                                    class="text-gray-400 font-normal normal-case ml-1">(Format: Indo Word, English
                                    Meaning)</span></label>
                            <textarea id="word-input" spellcheck="false"
                                class="w-full h-64 px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition resize-none font-mono text-sm shadow-sm leading-relaxed"></textarea>
                        </div>
                    </div>
                </div>
                <div class="p-6 border-t border-gray-200 bg-white shrink-0 z-10"
                    style="padding-bottom: max(1.5rem, env(safe-area-inset-bottom));">
                    <div class="max-w-3xl mx-auto studio-save-row">
                        <button onclick="saveListToServer()" class="studio-save-btn">Save Changes</button>
                    </div>
                </div>
            </div>

            <!-- QUIZ SECTION -->
            <div id="quiz-section"
                class="hidden absolute inset-0 bg-white z-20 flex flex-col items-center justify-center p-4 md:p-8 animate-fade-in"
                style="padding-bottom: max(2rem, env(safe-area-inset-bottom));">
                <div class="w-full max-w-3xl text-center">
                    <div
                        class="flex justify-between items-center text-xs font-bold tracking-wider text-gray-400 mb-4 uppercase">
                        <span id="quiz-mode-label">Translating</span>
                        <span id="current-count-text">0 / 0</span>
                    </div>

                    <!-- Heart Display -->
                    <div id="hearts-container" class="hidden flex justify-center gap-2 mb-8 h-8">
                        <i class="fas fa-heart text-red-500 text-2xl animate-pulse"></i>
                        <i class="fas fa-heart text-red-500 text-2xl animate-pulse"></i>
                        <i class="fas fa-heart text-red-500 text-2xl animate-pulse"></i>
                    </div>

                    <div class="w-full h-1.5 bg-gray-100 rounded-full mb-8 md:mb-12 overflow-hidden">
                        <div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-500 ease-out">
                        </div>
                    </div>

                    <div class="relative flex items-center justify-center mb-8 md:mb-12 gap-4">
                        <h2 id="question-word" class="text-4xl md:text-6xl font-bold text-gray-800 min-h-[1.2em]">...
                        </h2>
                        <!-- Replay Audio Button -->
                        <button type="button" onclick="replayAudio()" aria-label="Replay pronunciation"
                            class="text-gray-300 hover:text-blue-500 transition p-2 rounded-full hover:bg-blue-50"
                            title="Replay Audio">
                            <i class="fas fa-volume-up text-xl"></i>
                        </button>
                    </div>

                    <div class="relative max-w-xl mx-auto group min-h-[120px] flex flex-col justify-center">
                        <!-- TEXT INPUT -->
                        <div id="text-input-container">
                            <input type="text" id="answer-input" placeholder="Type answer here..." autocomplete="off"
                                class="w-full py-4 bg-transparent border-b-2 border-gray-300 text-2xl md:text-3xl text-center focus:outline-none focus:border-blue-500 transition-all">
                        </div>
                        <!-- SPEECH INPUT -->
                        <div id="speech-controls" class="hidden flex flex-col items-center justify-center gap-4">
                            <button type="button" id="mic-btn" onclick="activateSpeech()" aria-label="Start speech input"
                                class="relative w-20 h-20 rounded-full bg-gray-100 hover:bg-blue-50 text-blue-500 text-3xl shadow-md border border-gray-200 transition-all active:scale-95 flex items-center justify-center animate-fade-in">
                                <i id="mic-icon" class="fas fa-microphone"></i>
                            </button>
                            <p id="speech-status" class="text-sm text-gray-400 font-mono h-6">Click mic to speak</p>
                        </div>
                    </div>

                    <div id="feedback" class="h-10 mt-6 md:mt-8 text-lg font-semibold transition-opacity opacity-0" aria-live="polite">
                    </div>
                    <button type="button" onclick="showSection('select')"
                        class="mt-8 md:mt-12 text-gray-400 hover:text-red-500 text-sm font-medium transition flex items-center gap-2 mx-auto"><i
                            class="fas fa-stop-circle"></i> Quit Session</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="studio-core.js?v=20260408d"></script>
    <script src="language-configs.js"></script>
    <script>
        window.onload = () => {
            StudioCore.init(window.StudioConfigs.bahasa);
        };
        window.handleSearchKeyup = (event) => {
            if (window.filterLists) window.filterLists();
        };
        window.startTraining = (name) => {
            if (window.StudioConfigs.bahasa.startTraining) {
                window.StudioConfigs.bahasa.startTraining(name);
            }
        };
    </script>
</body>

</html>
