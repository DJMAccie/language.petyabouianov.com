name: Deploy To Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Pull live runtime JSON from Namecheap
        env:
          STUDIO_SYNC_BASE_URL: https://language.petyabouianov.com/studio_api.php
        run: php .github/scripts/sync-namecheap-runtime.php

      - name: Deploy tracked site files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /language.petyabouianov.com/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            .ftp-deploy-sync-state.json
            runtime-migration/**
            uploads/**
            newsletter/emails.txt
            upload_image_config.php
            studio_api_config.php
            **/*.mp3
            **/*.wav
            **/*.flac
            **/*.ogg
            **/*.aiff
            **/*.jpg
            **/*.jpeg
            **/*.png
            **/*.gif
            **/*.webp
            **/*.mp4
            **/*.mov
