name: Deploy To Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy tracked site files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /language.petyabouianov.com/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            .ftp-deploy-sync-state.json
            uploads/**
            newsletter/emails.txt
            upload_image_config.php
            studio_api_config.php
            global_lists.json
            global_scores.json
            global_word_stats.json
            **/*.mp3
            **/*.wav
            **/*.flac
            **/*.ogg
            **/*.aiff
            **/*.jpg
            **/*.jpeg
            **/*.png
            **/*.gif
            **/*.webp
            **/*.mp4
            **/*.mov

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Seed runtime files from main site when missing
        run: |
          set -u

          if lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; cls -1 /language.petyabouianov.com/.runtime-seeded; bye" >/dev/null 2>&1; then
            echo "Runtime data already migrated for language.petyabouianov.com"
            exit 0
          fi

          mkdir -p runtime-seed
          seeded_any=0

          for file in global_lists.json global_scores.json global_word_stats.json studio_api_config.php; do
            if lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
set ftp:ssl-force true
set ftp:ssl-protect-data true
set ssl:verify-certificate no
get /public_html/$file -o runtime-seed/$file
bye
EOF
            then
              if lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
set ftp:ssl-force true
set ftp:ssl-protect-data true
set ssl:verify-certificate no
put runtime-seed/$file -o /language.petyabouianov.com/$file
bye
EOF
              then
                seeded_any=1
                echo "Migrated $file into /language.petyabouianov.com/"
              else
                echo "Warning: failed to migrate $file" >&2
              fi
            else
              echo "Warning: could not fetch /public_html/$file for migration" >&2
            fi
          done

          if [ "$seeded_any" -eq 1 ]; then
            printf 'seeded on %s\n' "$(date -u +%FT%TZ)" > runtime-seed/.runtime-seeded
            lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
set ftp:ssl-force true
set ftp:ssl-protect-data true
set ssl:verify-certificate no
put runtime-seed/.runtime-seeded -o /language.petyabouianov.com/.runtime-seeded
bye
EOF
          else
            echo "No runtime files were migrated; leaving sentinel unset."
          fi
